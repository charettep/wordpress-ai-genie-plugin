# AI Content Forge — local WordPress development stack
#
# Configuration is loaded from `.env`.
# Use `./scripts/docker-setup.sh` for an interactive first-run setup.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:?Set MARIADB_DATABASE in .env}
      MARIADB_USER: ${MARIADB_USER:?Set MARIADB_USER in .env}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?Set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD in .env}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h localhost -u\"${MARIADB_USER:?Set MARIADB_USER in .env}\" -p\"${MARIADB_PASSWORD:?Set MARIADB_PASSWORD in .env}\""
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${SITE_PORT:?Set SITE_PORT in .env}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:?Set WORDPRESS_DB_HOST in .env}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:?Set WORDPRESS_DB_USER in .env}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?Set WORDPRESS_DB_PASSWORD in .env}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:?Set WORDPRESS_DB_NAME in .env}
      WORDPRESS_DEBUG: "1"
      WORDPRESS_DEBUG_LOG: "1"
      WORDPRESS_DEBUG_DISPLAY: "0"
      WORDPRESS_CONFIG_EXTRA: |
        define('SCRIPT_DEBUG', true);
        define('SAVEQUERIES', false);
        // When behind a reverse proxy (e.g., Cloudflare Tunnel) ensure WP builds URLs without the host port
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && strpos($$_SERVER['HTTP_X_FORWARDED_PROTO'], 'https') !== false) {
          $$_SERVER['HTTPS'] = 'on';
          $$_SERVER['SERVER_PORT'] = 443;
        }
        // Configure the public site URL via environment variable if needed
        if (!empty(getenv('WP_HOME'))) {
          define('WP_HOME', getenv('WP_HOME'));
          define('WP_SITEURL', getenv('WP_HOME'));
        }
    volumes:
      - wp_core:/var/www/html
      - .:/workspace/ai-content-forge:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/wp-login.php"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  wpcli:
    image: wordpress:cli
    depends_on:
      - db
      - wordpress
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - wp_core:/var/www/html
      - .:/workspace/ai-content-forge:ro
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST:?Set WORDPRESS_DB_HOST in .env}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:?Set WORDPRESS_DB_USER in .env}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:?Set WORDPRESS_DB_PASSWORD in .env}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:?Set WORDPRESS_DB_NAME in .env}

  ollama-proxy:
    image: alpine/socat
    network_mode: host
    restart: unless-stopped
    command: "TCP-LISTEN:${OLLAMA_PROXY_PORT:?Set OLLAMA_PROXY_PORT in .env},bind=0.0.0.0,reuseaddr,fork TCP:${OLLAMA_HOST_TARGET:?Set OLLAMA_HOST_TARGET in .env}"

  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "${PMA_PORT:?Set PMA_PORT in .env}:80"
    environment:
      PMA_HOST: ${PMA_HOST:?Set PMA_HOST in .env}
      PMA_USER: ${PMA_USER:?Set PMA_USER in .env}
      PMA_PASSWORD: ${PMA_PASSWORD:?Set PMA_PASSWORD in .env}

volumes:
  db_data:
  wp_core:
